<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QUANTUM FRONTIER</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#05030f; overflow:hidden; overscroll-behavior:none; font-family:'Courier New',monospace; color:#fff; touch-action:none; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; image-rendering:auto; background:#05030f; max-width:100%; max-height:100%; }
  #mute { position:fixed; top:10px; right:10px; z-index:30; background:rgba(0,0,0,0.4); border:1px solid #7b5cff; color:#b9a8ff; border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<button id="mute">SOUND: ON</button>
<script>
/* =======================================================================
   QUANTUM FRONTIER  v4 — horizontal galaxy flyer
   Survive as long as you can. Every 5s a partner project drifts through the
   background to discover, clip, and screenshot. No orbs, no leaderboard —
   just the adventure + the partners.  Optional soundtrack: quantum.mp3
   ======================================================================= */
const CONFIG = {
  FLAP: 460, GRAVITY: 1500, SHIP_X: 210, GATE_W: 66, GATE_EVERY: 320,
  TIER_SCROLL: [165,205,250,300], TIER_GAP: [240,205,178,156], TIER_SPACE: [1.35,1.15,1.0,0.9], TIER_SCENERY: [0.35,0.7,1.0,1.4],
  MUSIC_FILE: "quantum.mp3",
  SITE_URL: "https://proofofreal.app/games/quantumfrontier",
  LINKS: { x:"https://x.com/mememaxxers", opensea:"https://opensea.io/collection/jpeg-jokers", discord:"https://discord.gg/krVPuyksQy" },
};
const PARTNERS=[ {n:"HOTDOG",f:"hotdog.jpg"},{n:"RUYUI",f:"ruyui.jpg"},{n:"ZERO TO HERO",f:"zerotohero.png"},
  {n:"MOODY MADNESS",f:"moodymadness.jpg"},{n:"ABSTRACTIO",f:"abstractio.jpg"},{n:"SACRED WASTE",f:"sacredwaste.png"},
  {n:"MEME MAXXERS",f:"mememaxxers.jpg"},{n:"HAMIEVERSE",f:"hamieverse.png"},{n:"BEARISH",f:"bearish.jpg"},
  {n:"TOLLAN UNIVERSE",f:"tollanuniverse.jpg"},{n:"ONCHAIN HEROES",f:"onchainheroes.png"},{n:"GIGAVERSE",f:"gigaverse.png"} ];
const PIMG=PARTNERS.map(p=>{ const im=new Image(); im.src='partners/'+encodeURIComponent(p.f); return im; });
function imgReady(im){ return im&&im.complete&&im.naturalWidth>0; }
function drawCover(im,dx,dy,dw,dh){ const ar=im.naturalWidth/im.naturalHeight, br=dw/dh; let sw,sh,sx,syy;
  if(ar>br){ sh=im.naturalHeight; sw=sh*br; sx=(im.naturalWidth-sw)/2; syy=0; } else { sw=im.naturalWidth; sh=sw/br; sx=0; syy=(im.naturalHeight-sh)/2; }
  ctx.drawImage(im,sx,syy,sw,sh,dx,dy,dw,dh); }
const ZONES=[ {n:'INNER SYSTEM',a:'#0a0620',b:'#1a0b33'},{n:'DEEP SPACE',a:'#06121f',b:'#123a4a'},
              {n:'THE ANOMALY',a:'#1a0b2e',b:'#3a1560'},{n:'QUANTUM CORE',a:'#2a0810',b:'#5c1030'} ];
const TIER_GATE=[['#6b3bff','#9b6bff'],['#0e8f8f','#26d6d6'],['#b03bff','#ff6ad5'],['#ff3b6b','#ffa33b']];   // tubes recolor per difficulty tier
const VW=960, VH=540;
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
canvas.width=VW; canvas.height=VH;
function fit(){ const r=Math.min(window.innerWidth/VW, window.innerHeight/VH); canvas.style.width=(VW*r)+'px'; canvas.style.height=(VH*r)+'px'; }
addEventListener('resize',fit); fit();
const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;

/* ---------------- Audio ---------------- */
const Sound=(()=>{
  let actx=null,muted=false,sg=null,bgm=null;
  function ensure(){ if(actx) return; actx=new (window.AudioContext||window.webkitAudioContext)(); sg=actx.createGain(); sg.gain.value=0.3; sg.connect(actx.destination); }
  function ensureBgm(){ if(bgm) return; bgm=document.createElement('audio'); bgm.src=CONFIG.MUSIC_FILE; bgm.loop=true; bgm.volume=0.5; bgm.muted=muted; }
  function tone(f,d,t,v=1){ if(!actx||muted) return; const o=actx.createOscillator(),g=actx.createGain(); o.type=t; o.frequency.value=f; g.gain.setValueAtTime(0.0001,actx.currentTime); g.gain.exponentialRampToValueAtTime(v,actx.currentTime+0.01); g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d); o.connect(g); g.connect(sg); o.start(); o.stop(actx.currentTime+d+0.02); }
  function slide(f1,f2,d,t,v=1){ if(!actx||muted) return; const o=actx.createOscillator(),g=actx.createGain(); o.type=t; o.frequency.setValueAtTime(f1,actx.currentTime); o.frequency.linearRampToValueAtTime(f2,actx.currentTime+d); g.gain.setValueAtTime(v,actx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d); o.connect(g); g.connect(sg); o.start(); o.stop(actx.currentTime+d+0.02); }
  return {
    resume(){ ensure(); if(actx.state==='suspended') actx.resume(); },
    startMusic(){ ensureBgm(); bgm.muted=muted; const p=bgm.play(); if(p&&p.catch) p.catch(()=>{}); },
    restartMusic(){ ensureBgm(); bgm.muted=muted; try{bgm.currentTime=0;}catch(e){} const p=bgm.play(); if(p&&p.catch) p.catch(()=>{}); },
    stopMusic(){ if(bgm) bgm.pause(); },
    setMuted(m){ muted=m; if(bgm) bgm.muted=m; }, isMuted(){ return muted; },
    flap(){ slide(520,760,0.09,'square',0.3); },
    gate(){ tone(880,0.06,'square',0.35); },
    discover(){ [660,990,1320].forEach((f,i)=>setTimeout(()=>tone(f,0.12,'triangle',0.35),i*55)); },
    warp(){ slide(180,1200,0.7,'sawtooth',0.35); },
    boom(){ slide(260,50,0.5,'sawtooth',0.7); tone(60,0.4,'square',0.5); },
    womp(){ slide(300,180,0.28,'sawtooth',0.5); setTimeout(()=>slide(230,120,0.42,'sawtooth',0.5),300); },
  };
})();
document.getElementById('mute').addEventListener('click',e=>{ const m=!Sound.isMuted(); Sound.setMuted(m); e.target.textContent='SOUND: '+(m?'OFF':'ON'); e.target.style.color=m?'#666':'#b9a8ff'; e.target.style.borderColor=m?'#666':'#7b5cff'; });

/* ---------------- Input ---------------- */
function cpoint(e){ const r=canvas.getBoundingClientRect(); return {x:(e.clientX-r.left)*(VW/r.width), y:(e.clientY-r.top)*(VH/r.height)}; }
function tap(x,y){ Sound.resume();
  if(state==='title'){ startGame(); return; }
  if(state==='play'){ if(warpT<=0 && !dying) flap(); return; }
  if(state==='over'){ handleEndClick(x,y); return; }
}
canvas.addEventListener('pointerdown',e=>{ const p=cpoint(e); tap(p.x,p.y); });
addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); tap(VW/2,VH/2); } });

/* ---------------- State ---------------- */
let state='title', last=0, elapsed=0;
let ship, gates, parts, stars, planets, score, scroll, gateTimer, popup, popupT;
let bills, bbQueue, nextBb, seen, discoveredN, nebulas, popupImg;
let aliens, rocks, comets, bgPortals, alienT, rockT, cometT, portalT;
let warpT=0, dying=false, deathT=0, boomX=0, boomY=0, lastTier=-1, zoneMsg='', zoneMsgT=0;
let shake=0, flashT=0;

function tier(){ return elapsed<15?0:elapsed<30?1:elapsed<45?2:3; }
function refillQueue(){ bbQueue=[...Array(PARTNERS.length).keys()]; for(let i=bbQueue.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [bbQueue[i],bbQueue[j]]=[bbQueue[j],bbQueue[i]]; } }

function reset(){
  ship={x:-90, y:VH/2, vy:0, rot:0};
  gates=[]; parts=[]; bills=[]; aliens=[]; rocks=[]; comets=[]; bgPortals=[];
  alienT=2.5; rockT=1.4; cometT=6; portalT=8;
  stars=Array.from({length:70},()=>({x:Math.random()*VW,y:Math.random()*VH,z:0.3+Math.random()*0.9,s:Math.random()*1.6+0.4}));
  planets=Array.from({length:3},(_,i)=>({x:Math.random()*VW,y:80+Math.random()*(VH-160),r:30+Math.random()*46,c:['#3a2170','#123a4a','#4a1250'][i],z:0.15+Math.random()*0.15}));
  nebulas=Array.from({length:3},(_,i)=>({x:Math.random()*VW,y:Math.random()*VH,r:170+Math.random()*150,c:['rgba(107,59,255,0.12)','rgba(77,225,255,0.09)','rgba(255,106,213,0.09)'][i],z:0.08+Math.random()*0.08}));
  score=0; scroll=CONFIG.TIER_SCROLL[0]; gateTimer=1.2; popup=''; popupT=0;
  bbQueue=[]; refillQueue(); nextBb=5; seen={}; discoveredN=0; popupImg=-1;
  elapsed=0; warpT=1.1; dying=false; deathT=0; lastTier=-1; zoneMsg=''; zoneMsgT=0;
}
function startGame(){ reset(); state='play'; Sound.restartMusic(); Sound.warp(); }
function flap(){ ship.vy=-CONFIG.FLAP; Sound.flap(); parts.push({x:CONFIG.SHIP_X-16,y:ship.y+8,vx:-120,vy:40,life:0.4,c:'#4de1ff'}); }
function spawnBillboard(){ if(bbQueue.length===0) refillQueue(); const i=bbQueue.pop(); if(!seen[i]){ seen[i]=1; discoveredN++; }
  const top=Math.random()<0.5, yy=top? 50+Math.random()*70 : 268+Math.random()*64;   // top or lower band, clear of mid flight lane
  bills.push({i, x:VW+150, y:yy, t:0}); popup='DISCOVERED: '+PARTNERS[i].n; popupImg=i; popupT=1.9; Sound.discover(); }

/* ---------------- Crash / end ---------------- */
function crash(){ if(dying) return; dying=true; deathT=1.2; boomX=CONFIG.SHIP_X; boomY=ship.y;
  Sound.boom(); setTimeout(()=>Sound.womp(),340); shake=20; flashT=0.5;
  for(let i=0;i<30;i++) parts.push({x:boomX,y:boomY,vx:(Math.random()-0.5)*460,vy:(Math.random()-0.5)*460,life:0.7+Math.random()*0.5,c:['#ff8a3d','#d7d9ff','#4de1ff','#ff2a6d'][i%4]}); }
function finalizeOver(){ state='over'; Sound.stopMusic(); }

function shareText(){ const url=CONFIG.SITE_URL;
  return `I flew the Quantum Frontier and scored ${score} 🚀\n\nDiscovered ${discoveredN}/${PARTNERS.length} @abstractchain partners along the way. 🧑‍🚀\n\nEnter the @mememaxxers Quantum Universe 👇\n\n${url}`; }
function shareURL(){ return 'https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText()); }
function shareNow(){ const webUrl=shareURL();
  if(isTouch){ const appUrl='twitter://post?message='+encodeURIComponent(shareText()); let opened=false; const onHide=()=>{opened=true;};
    document.addEventListener('visibilitychange',onHide,{once:true}); window.location.href=appUrl;
    setTimeout(()=>{ document.removeEventListener('visibilitychange',onHide); if(!opened) window.open(webUrl,'_blank'); },800);
  } else window.open(webUrl,'_blank'); }

/* ---------------- Update ---------------- */
function update(dt){
  if(shake>0) shake=Math.max(0,shake-dt*40); if(flashT>0) flashT-=dt; if(popupT>0) popupT-=dt; if(zoneMsgT>0) zoneMsgT-=dt;
  if(warpT>0){ warpT-=dt; ship.x += (CONFIG.SHIP_X-ship.x)*Math.min(1,dt*4); ship.y=VH/2; stars.forEach(s=>{ s.x-=900*s.z*dt; if(s.x<0) s.x=VW; }); if(warpT<=0) ship.x=CONFIG.SHIP_X; return; }
  if(dying){ deathT-=dt; parts.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; }); parts=parts.filter(p=>p.life>0); if(deathT<=0) finalizeOver(); return; }

  elapsed+=dt;
  const ti=tier();
  if(ti!==lastTier){ lastTier=ti; if(ti>0){ zoneMsg='ENTERING: '+ZONES[ti].n; zoneMsgT=1.8; } }
  scroll=CONFIG.TIER_SCROLL[ti];

  ship.vy+=CONFIG.GRAVITY*dt; ship.y+=ship.vy*dt; ship.rot=Math.max(-0.5,Math.min(1.1,ship.vy/620));
  if(ship.y<16 || ship.y>VH-16){ crash(); return; }
  parts.push({x:CONFIG.SHIP_X-16,y:ship.y+6,vx:-110-Math.random()*70,vy:(Math.random()-0.5)*30,life:0.35,c:Math.random()<0.5?'#4de1ff':'#ff8a3d'});   // engine trail

  // gates (the only obstacle)
  gateTimer-=dt;
  if(gateTimer<=0){ const g=CONFIG.TIER_GAP[ti], gy=70+Math.random()*(VH-140-g)+g/2;
    gates.push({x:VW+40,gy,gp:g,passed:false}); gateTimer=(CONFIG.GATE_EVERY*CONFIG.TIER_SPACE[ti])/scroll; }
  gates.forEach(g=>{ g.x-=scroll*dt;
    if(!g.passed && g.x+CONFIG.GATE_W<CONFIG.SHIP_X){ g.passed=true; score+=1; Sound.gate(); for(let k=0;k<6;k++) parts.push({x:CONFIG.SHIP_X,y:g.gy+(Math.random()*g.gp-g.gp/2),vx:-70,vy:(Math.random()-0.5)*140,life:0.4,c:'#4de1ff'}); }
    const sx=CONFIG.SHIP_X, sr=15;
    if(sx+sr>g.x && sx-sr<g.x+CONFIG.GATE_W){ if(ship.y-sr<g.gy-g.gp/2 || ship.y+sr>g.gy+g.gp/2){ crash(); return; } } });
  gates=gates.filter(g=>g.x>-CONFIG.GATE_W-10);

  // partner billboards — one every 5s, drifting slowly so you can look/clip
  if(elapsed>=nextBb){ spawnBillboard(); nextBb+=5; }
  bills.forEach(b=>{ b.x-=scroll*0.55*dt; b.t+=dt; }); bills=bills.filter(b=>b.x>-200);

  // ambient scenery (background, sparse early, builds each zone)
  const dens=CONFIG.TIER_SCENERY[ti];
  alienT-=dt; if(alienT<=0){ aliens.push({x:VW+40,y:40+Math.random()*(VH-140),vx:-(40+Math.random()*70),ph:Math.random()*6,c:['#16c784','#4de1ff','#b06bff','#ff6ad5'][Math.floor(Math.random()*4)]}); alienT=(2.6/dens)+Math.random(); }
  rockT-=dt; if(rockT<=0){ rocks.push({x:VW+70,y:Math.random()*VH,r:14+Math.random()*30,vx:-(scroll*0.55+Math.random()*120),rot:Math.random()*6,vr:(Math.random()-0.5)*5}); rockT=(1.2/dens)+Math.random()*0.4; }
  if(ti>=1){ cometT-=dt; if(cometT<=0){ comets.push({x:VW+40,y:Math.random()*VH*0.6,vx:-(520+Math.random()*320),vy:130+Math.random()*120,life:1.2}); cometT=(2.6/dens)+Math.random()*2; } }
  if(ti>=1){ portalT-=dt; if(portalT<=0){ bgPortals.push({x:150+Math.random()*(VW-300),y:60+Math.random()*(VH-120),mr:44+Math.random()*80,life:1.4,c:['#6b3bff','#4de1ff','#ff6ad5'][Math.floor(Math.random()*3)]}); portalT=(3/dens)+Math.random()*2; } }
  aliens.forEach(a=>{ a.x+=a.vx*dt; a.ph+=dt*3; }); aliens=aliens.filter(a=>a.x>-50);
  rocks.forEach(r=>{ r.x+=r.vx*dt; r.rot+=r.vr*dt; }); rocks=rocks.filter(r=>r.x>-80);
  comets.forEach(c=>{ c.x+=c.vx*dt; c.y+=c.vy*dt; c.life-=dt; }); comets=comets.filter(c=>c.life>0 && c.x>-60);
  bgPortals.forEach(p=>{ p.life-=dt; }); bgPortals=bgPortals.filter(p=>p.life>0);

  stars.forEach(s=>{ s.x-=scroll*s.z*dt; if(s.x<0){ s.x=VW; s.y=Math.random()*VH; } });
  planets.forEach(p=>{ p.x-=scroll*p.z*dt; if(p.x<-p.r){ p.x=VW+p.r; p.y=80+Math.random()*(VH-160); } });
  nebulas.forEach(n=>{ n.x-=scroll*n.z*dt; if(n.x<-n.r){ n.x=VW+n.r; n.y=Math.random()*VH; } });
  parts.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; }); parts=parts.filter(p=>p.life>0);
}

/* ---------------- Draw ---------------- */
function lerpCol(a,b,t){ const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
  const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
  return `rgb(${pa.map((v,i)=>Math.round(v+(pb[i]-v)*t)).join(',')})`; }
function drawAlien(a){ const y=a.y+Math.sin(a.ph)*6; ctx.save(); ctx.translate(a.x,y); ctx.globalAlpha=0.5;
  ctx.fillStyle=a.c; ctx.beginPath(); ctx.ellipse(0,0,15,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(205,240,255,0.7)'; ctx.beginPath(); ctx.arc(0,-3,6,Math.PI,0); ctx.fill(); ctx.restore(); ctx.globalAlpha=1; }
function drawRock(r){ ctx.save(); ctx.globalAlpha=0.45; ctx.translate(r.x,r.y); ctx.rotate(r.rot); ctx.fillStyle='#5a5562'; ctx.beginPath();
  for(let i=0;i<7;i++){ const ang=i/7*Math.PI*2, rr=r.r*(0.78+0.22*Math.sin(i*3)); ctx.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr); } ctx.closePath(); ctx.fill(); ctx.restore(); ctx.globalAlpha=1; }
function drawBillboard(b){ const p=PARTNERS[b.i], im=PIMG[b.i], s=140, x=b.x, y=b.y+Math.sin(b.t*2)*4;
  ctx.save();
  ctx.globalAlpha=0.75; ctx.shadowColor='#4de1ff'; ctx.shadowBlur=16; ctx.fillStyle='rgba(8,10,26,0.5)'; ctx.fillRect(x-7,y-7,s+14,s+14); ctx.shadowBlur=0;
  ctx.globalAlpha=0.6; if(imgReady(im)) drawCover(im,x,y,s,s); else { ctx.fillStyle='#141428'; ctx.fillRect(x,y,s,s); }   // semi-transparent so it never hides the tubes
  ctx.globalAlpha=0.8; ctx.strokeStyle='#4de1ff'; ctx.lineWidth=3; ctx.strokeRect(x-1,y-1,s+2,s+2);
  ctx.fillStyle='rgba(8,10,26,0.85)'; ctx.fillRect(x-7,y+s+6,s+14,24);
  ctx.globalAlpha=1; ctx.fillStyle='#4de1ff'; ctx.font='bold 13px Courier New'; ctx.textAlign='center'; ctx.fillText(p.n,x+s/2,y+s+23);
  ctx.restore(); }
function drawBg(){
  const ti=tier(), z=ZONES[ti], nz=ZONES[Math.min(ti+1,3)], bnd=[0,15,30,45,60], t=Math.min(1,(elapsed-bnd[ti])/((bnd[ti+1]-bnd[ti])||1));
  const g=ctx.createLinearGradient(0,0,0,VH); g.addColorStop(0,lerpCol(z.a,nz.a,t)); g.addColorStop(1,lerpCol(z.b,nz.b,t)); ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
  nebulas.forEach(n=>{ const rg=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r); rg.addColorStop(0,n.c); rg.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill(); });
  bgPortals.forEach(p=>{ const a=Math.max(0,p.life/1.4); ctx.globalAlpha=a*0.5; ctx.strokeStyle=p.c; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(p.x,p.y,p.mr*(1-p.life/1.4),0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; });
  planets.forEach(p=>{ ctx.globalAlpha=0.45; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); ctx.globalAlpha=1; });
  const warp=warpT>0||elapsed>30; stars.forEach(s=>{ ctx.globalAlpha=0.4+s.z*0.5; ctx.fillStyle='#cfe8ff'; ctx.fillRect(s.x,s.y,warp?s.s*(3+s.z*7):s.s,s.s); }); ctx.globalAlpha=1;
  comets.forEach(c=>{ ctx.globalAlpha=Math.min(1,c.life); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(c.x,c.y); ctx.lineTo(c.x+42,c.y-17); ctx.stroke(); ctx.globalAlpha=1; });
  aliens.forEach(drawAlien); rocks.forEach(drawRock);
  bills.forEach(drawBillboard);   // partner projects, the stars of the show
}
function drawGate(g){ const top=g.gy-g.gp/2, bot=g.gy+g.gp/2, w=CONFIG.GATE_W, gc=TIER_GATE[tier()];
  const grd=ctx.createLinearGradient(g.x,0,g.x+w,0); grd.addColorStop(0,gc[0]); grd.addColorStop(1,gc[1]);
  ctx.fillStyle=grd; ctx.fillRect(g.x,0,w,top); ctx.fillRect(g.x,bot,w,VH-bot);
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fillRect(g.x,top-6,w,6); ctx.fillRect(g.x,bot,w,6); }
function drawShip(){ const x=ship.x, y=ship.y; ctx.save(); ctx.translate(x,y); ctx.rotate(ship.rot);
  if(warpT>0){ ctx.globalAlpha=0.6; ctx.fillStyle='#4de1ff'; ctx.fillRect(-200,-3,200,6); ctx.globalAlpha=1; }
  ctx.fillStyle='#ff8a3d'; ctx.beginPath(); ctx.moveTo(-16,-6); ctx.lineTo(-16,6); ctx.lineTo(-16-(10+Math.random()*10),0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#d7d9ff'; ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(-14,-12); ctx.lineTo(-8,0); ctx.lineTo(-14,12); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#6b3bff'; ctx.beginPath(); ctx.arc(2,0,5,0,7); ctx.fill();
  ctx.fillStyle='#4de1ff'; ctx.fillRect(-2,-13,6,4); ctx.fillRect(-2,9,6,4); ctx.restore(); }
function drawHUD(){
  ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='bold 44px Courier New'; ctx.fillText(score,VW/2,54);
  ctx.fillStyle='#b06bff'; ctx.font='bold 14px Courier New'; ctx.fillText(ZONES[tier()].n,VW/2,74);
  ctx.textAlign='left'; ctx.fillStyle='#4de1ff'; ctx.font='bold 15px Courier New'; ctx.fillText('PARTNERS: '+discoveredN+'/'+PARTNERS.length,14,26);
  if(zoneMsgT>0){ ctx.textAlign='center'; ctx.fillStyle=`rgba(77,225,255,${Math.min(1,zoneMsgT)})`; ctx.font='bold 26px Courier New'; ctx.fillText(zoneMsg,VW/2,VH*0.22); }
  if(popupT>0){ const a=Math.min(1,popupT), ph=46, cy=VH*0.9; ctx.save(); ctx.globalAlpha=a; ctx.font='bold 22px Courier New'; ctx.textAlign='left';
    const tw=ctx.measureText(popup).width, hasImg=popupImg>=0&&imgReady(PIMG[popupImg]), tot=(hasImg?ph+12:0)+tw, sx=VW/2-tot/2;
    if(hasImg){ drawCover(PIMG[popupImg],sx,cy-ph/2,ph,ph); ctx.strokeStyle='#f9c80e'; ctx.lineWidth=2; ctx.strokeRect(sx,cy-ph/2,ph,ph); }
    ctx.fillStyle='#f9c80e'; ctx.fillText(popup,sx+(hasImg?ph+12:0),cy+8); ctx.restore(); }
  if(warpT>0){ ctx.textAlign='center'; ctx.fillStyle='#4de1ff'; ctx.font='bold 30px Courier New'; ctx.fillText('WARPING IN...',VW/2,VH*0.5); }
}

let endBtns={};
function drawTitle(){ drawBg();
  ctx.textAlign='center'; ctx.save(); ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=8;
  ctx.fillStyle='#b06bff'; ctx.font='bold 60px Courier New'; ctx.fillText('QUANTUM',VW/2,VH*0.30);
  ctx.fillStyle='#4de1ff'; ctx.fillText('FRONTIER',VW/2,VH*0.30+56);
  ctx.fillStyle='#fff'; ctx.font='bold 18px Courier New'; ctx.fillText('Fly deep · discover the 12 Abstract partners · survive',VW/2,VH*0.58);
  ctx.fillStyle='#9fb3c8'; ctx.font='16px Courier New'; ctx.fillText(isTouch?'TAP to flap · fly through the portals':'SPACE / CLICK to flap · fly through the portals',VW/2,VH*0.65);
  ctx.fillStyle='#9fb3c8'; ctx.font='15px Courier New'; ctx.fillText('a new partner appears every 5s — clip your favorites 📸',VW/2,VH*0.71);
  ctx.fillStyle=`rgba(249,200,14,${0.5+0.5*Math.sin(performance.now()/300)})`; ctx.font='bold 24px Courier New'; ctx.fillText(isTouch?'TAP TO START':'PRESS SPACE / CLICK TO START',VW/2,VH*0.85);
  ctx.restore();
  ship={x:VW*0.5,y:VH*0.42,vy:0,rot:0}; drawShip();
}
function drawOver(){ drawBg(); ctx.fillStyle='rgba(5,3,15,0.8)'; ctx.fillRect(0,0,VW,VH); ctx.textAlign='center';
  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=8;
  ctx.fillStyle='#ff2a6d'; ctx.font='bold 36px Courier New'; ctx.fillText('RUN OVER',VW/2,52);
  ctx.fillStyle='#fff'; ctx.font='bold 40px Courier New'; ctx.fillText('SCORE '+score,VW/2,98);
  ctx.restore();
  // partner gallery (nostalgia wall) — all-time discoveries; undiscovered stay a mystery
  const done=discoveredN>=PARTNERS.length;
  if(done){ const cc=['#16c784','#f9c80e','#05d9e8','#b06bff','#ff6ad5']; const tt=performance.now()/1000; for(let i=0;i<40;i++){ const x=(i*97)%VW, y=((tt*130+i*61)%(VH+40))-20; ctx.save(); ctx.translate(x,y); ctx.rotate(tt*3+i); ctx.fillStyle=cc[i%5]; ctx.fillRect(-3,-3,6,6); ctx.restore(); } }
  ctx.textAlign='center'; ctx.fillStyle=done?'#16c784':'#4de1ff'; ctx.font='bold 16px Courier New'; ctx.fillText(done?'★ ALL '+PARTNERS.length+' DISCOVERED! ★':'PARTNERS DISCOVERED: '+discoveredN+' / '+PARTNERS.length,VW/2,146);
  if(!done){ ctx.fillStyle='#9fb3c8'; ctx.font='13px Courier New'; ctx.fillText('fly again to discover the rest 👀',VW/2,166); }
  const cols=6, tw=72, th=72, gapx=14, gxs=(VW-(cols*tw+(cols-1)*gapx))/2, gys=182;
  PARTNERS.forEach((p,i)=>{ const col=i%cols, row=Math.floor(i/cols), x=gxs+col*(tw+gapx), y=gys+row*(th+26), has=!!seen[i];
    if(has){ if(imgReady(PIMG[i])) drawCover(PIMG[i],x,y,tw,th); else { ctx.fillStyle='#141428'; ctx.fillRect(x,y,tw,th); } ctx.strokeStyle='#4de1ff'; }
    else { ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fillRect(x,y,tw,th); ctx.fillStyle='#3a3a55'; ctx.font='bold 26px Courier New'; ctx.textAlign='center'; ctx.fillText('?',x+tw/2,y+th/2+9); ctx.strokeStyle='#333'; }
    ctx.lineWidth=1; ctx.strokeRect(x,y,tw,th);
    ctx.fillStyle=has?'#cfe8ff':'#4a4a66'; ctx.font='8px Courier New'; ctx.textAlign='center'; ctx.fillText(has?p.n:'? ? ?',x+tw/2,y+th+12); });
  // buttons
  endBtns.share={x:VW/2-256,y:VH-118,w:246,h:48}; endBtns.again={x:VW/2+10,y:VH-118,w:246,h:48};
  ctx.textAlign='center';
  ctx.fillStyle='#1da1f2'; ctx.fillRect(endBtns.share.x,endBtns.share.y,246,48); ctx.fillStyle='#fff'; ctx.font='bold 20px Courier New'; ctx.fillText('SHARE ON X',endBtns.share.x+123,endBtns.share.y+31);
  ctx.fillStyle='#6b3bff'; ctx.fillRect(endBtns.again.x,endBtns.again.y,246,48); ctx.fillStyle='#fff'; ctx.fillText('FLY AGAIN',endBtns.again.x+123,endBtns.again.y+31);
  const by=VH-54, bh=40;
  endBtns.os={x:24,y:by,w:300,h:bh}; endBtns.x={x:340,y:by,w:250,h:bh}; endBtns.dc={x:606,y:by,w:330,h:bh};
  const lbtn=(b,col,label)=>{ ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fillRect(b.x,b.y,b.w,b.h); ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(b.x,b.y,b.w,b.h); ctx.fillStyle=col; ctx.font='bold 14px Courier New'; ctx.textAlign='center'; ctx.fillText(label,b.x+b.w/2,b.y+25); };
  lbtn(endBtns.os,'#f9c80e','JPEG JOKERS: MAX FREE MINTS');
  lbtn(endBtns.x,'#4de1ff','FOLLOW @mememaxxers');
  lbtn(endBtns.dc,'#b06bff','JOIN OUR DISCORD COMMUNITY');
}
function handleEndClick(x,y){ const hit=b=>x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h;
  if(hit(endBtns.share)) shareNow();
  else if(hit(endBtns.again)) startGame();
  else if(endBtns.x&&hit(endBtns.x)) window.open(CONFIG.LINKS.x,'_blank');
  else if(endBtns.os&&hit(endBtns.os)) window.open(CONFIG.LINKS.opensea,'_blank');
  else if(endBtns.dc&&hit(endBtns.dc)) window.open(CONFIG.LINKS.discord,'_blank');
}

/* ---------------- Loop ---------------- */
function frame(t){ const dt=Math.min(0.033,(t-last)/1000)||0; last=t;
  if(state==='play') update(dt);
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,VW,VH);
  if(state==='title'){ drawTitle(); requestAnimationFrame(frame); return; }
  if(state==='over'){ drawOver(); requestAnimationFrame(frame); return; }
  if(shake>0) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  drawBg(); gates.forEach(drawGate);
  parts.forEach(p=>{ ctx.globalAlpha=Math.max(0,p.life*2); ctx.fillStyle=p.c; ctx.fillRect(p.x,p.y,3,3); }); ctx.globalAlpha=1;
  if(dying){ const pr=(1.2-deathT)*120; ctx.globalAlpha=Math.max(0,deathT/1.2); ctx.strokeStyle='#ff8a3d'; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(boomX,boomY,pr,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }
  else drawShip();
  drawHUD();
  ctx.setTransform(1,0,0,1,0,0);
  if(flashT>0){ ctx.fillStyle=`rgba(255,138,61,${flashT*0.6})`; ctx.fillRect(0,0,VW,VH); }
  requestAnimationFrame(frame);
}
reset(); state='title';
requestAnimationFrame(frame);
document.addEventListener('visibilitychange',()=>{ if(document.hidden) Sound.stopMusic(); else if(state==='play'&&!dying&&warpT<=0) Sound.startMusic(); });
</script>
</body>
