<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ATTACK ON WEMBY</title>
<style>
  :root { --neon:#ff2a6d; --cyan:#05d9e8; --gold:#f9c80e; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#05010f; overflow:hidden; font-family:'Courier New',monospace; color:#fff; touch-action:none; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; image-rendering:pixelated; background:#05010f; max-width:100%; max-height:100%; }
  #touch { position:fixed; inset:0; pointer-events:none; z-index:20; display:none; }
  .pad { position:absolute; bottom:18px; display:flex; gap:12px; }
  .pad.left { left:16px; } .pad.right { right:16px; }
  .btn { pointer-events:auto; width:64px; height:64px; border-radius:50%;
    background:rgba(255,42,109,0.18); border:2px solid var(--neon); color:#fff; font-size:13px; font-weight:bold;
    display:flex; align-items:center; justify-content:center; user-select:none; backdrop-filter:blur(2px); text-align:center; line-height:1.1; }
  .btn:active { background:rgba(255,42,109,0.5); transform:scale(0.94); }
  .btn.sh { border-color:var(--cyan); background:rgba(5,217,232,0.18); }
  .btn.sp { border-color:var(--gold); background:rgba(249,200,14,0.18); }
  #mute { position:fixed; top:10px; right:10px; z-index:30; pointer-events:auto;
    background:rgba(0,0,0,0.4); border:1px solid var(--cyan); color:var(--cyan); border-radius:8px;
    padding:6px 10px; font-size:12px; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<button id="mute">SOUND: ON</button>
<div id="touch">
  <div class="pad left"><div class="btn" data-k="left">◀</div><div class="btn" data-k="right">▶</div></div>
  <div class="pad right">
    <div class="btn" data-k="jump">JUMP</div>
    <div class="btn sh" data-k="shoot">SHOOT</div>
    <div class="btn sp" data-k="special">SP</div>
  </div>
</div>

<script>
/* =======================================================================
   ATTACK ON WEMBY  v4  —  single-file canvas game
   Requires these asset files in the SAME folder as this index.html:
     attackontitantheme.mp3, kobe bryant.jpg, jalen brunson.jpg, wemby.jpg, SGA.jpg
   Tweak everything here:
   ======================================================================= */
const CONFIG = {
  QUARTER_SECONDS: 60,
  TITAN_HP: 3800,
  PLAYER_HP: 5,
  SWISH_DAMAGE: 70,
  THREE_BONUS: 1.6,
  STREAK_DMG_STEP: 0.15,
  SPECIAL_DAMAGE: 150,
  METER_PER_MAKE: 18, METER_PER_DODGE: 12, METER_MAX: 100,
  PLAYER_SPEED: 300, GRAVITY: 1700, JUMP_V: 720,
  SMACK_DMG: 1, SHOT_COOLDOWN: 0.5, INVINCIBLE_TIME: 1.5,
  // KNICKS hero
  HERO_NAME: "BRUNSON", HERO_NUM: "11", KNICKS_BLUE:"#1D428A", KNICKS_ORANGE:"#F58426", CAPE_COLOR:"#0a1430",
  // SPURS titan
  BOSS_NAME: "WEMBY", BOSS_NUM:"1", SPURS_SILVER:"#C4CED4", SPURS_BLACK:"#111417",
  RAGE_GLOW: ["#6f3bff","#d24b8f","#e23b2e"],   // aura tint by rage level
  MUSIC_FILE: "attackontitantheme.mp3",
  SITE_URL: "https://proofofreal.app/games/attackonwemby",   // share-on-X link
  SHARE_HASHTAG: "#ProofOfReal",
};
const STREAK_MILESTONES=[5,10,25,50,100];
const CUTIN_DUR=1.4;

const VW=960, VH=540;
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
canvas.width=VW; canvas.height=VH;
function fit(){ const r=Math.min(window.innerWidth/VW,window.innerHeight/VH);
  canvas.style.width=(VW*r)+'px'; canvas.style.height=(VH*r)+'px'; }
addEventListener('resize',fit); fit();
const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
if(isTouch) document.getElementById('touch').style.display='block';

const GROUND=VH-64;
const HOOP={x:VW*0.84, y:VH*0.34, r:24};

/* ---------------- Portrait images ---------------- */
const IMG_SRC={ kobe:'kobe bryant.jpg', brunson:'jalen brunson.jpg', wemby:'wemby.jpg', sga:'SGA.jpg', lebron:'lebron.jpg', aot:'attack on titan.jpg', jbryant:'jalen bryant.jpg' };
const IMG={};
for(const k in IMG_SRC){ const im=new Image(); im.src=encodeURI(IMG_SRC[k]); IMG[k]=im; }
function imgReady(im){ return im && im.complete && im.naturalWidth>0; }

/* ---------------- Audio (mp3 music + procedural SFX) ---------------- */
const Sound=(()=>{
  let actx=null,muted=false,sg=null,bgm=null;
  function ensure(){ if(actx) return; actx=new (window.AudioContext||window.webkitAudioContext)();
    sg=actx.createGain(); sg.gain.value=0.3; sg.connect(actx.destination); }
  function ensureBgm(){ if(bgm) return; bgm=document.createElement('audio');
    bgm.src=CONFIG.MUSIC_FILE; bgm.loop=true; bgm.volume=0.5; bgm.muted=muted; }
  function tone(f,d,t,v=1){ if(!actx||muted) return;
    const o=actx.createOscillator(),g=actx.createGain(); o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,actx.currentTime); g.gain.exponentialRampToValueAtTime(v,actx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d); o.connect(g); g.connect(sg); o.start(); o.stop(actx.currentTime+d+0.02); }
  function slide(f1,f2,d,t,v=1){ if(!actx||muted) return;
    const o=actx.createOscillator(),g=actx.createGain(); o.type=t;
    o.frequency.setValueAtTime(f1,actx.currentTime); o.frequency.linearRampToValueAtTime(f2,actx.currentTime+d);
    g.gain.setValueAtTime(v,actx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d);
    o.connect(g); g.connect(sg); o.start(); o.stop(actx.currentTime+d+0.02); }
  return {
    resume(){ ensure(); if(actx.state==='suspended') actx.resume(); },
    startMusic(){ ensureBgm(); bgm.muted=muted; const p=bgm.play(); if(p&&p.catch) p.catch(()=>{}); },
    restartMusic(){ ensureBgm(); bgm.muted=muted; try{ bgm.currentTime=0; }catch(e){} const p=bgm.play(); if(p&&p.catch) p.catch(()=>{}); },
    stopMusic(){ if(bgm) bgm.pause(); },
    squeak(){ slide(1200,500,0.12,'square',0.3); },
    setMuted(m){ muted=m; if(bgm) bgm.muted=m; },
    isMuted(){ return muted; },
    swish(){ slide(900,1500,0.18,'sine',0.4); tone(1200,0.06,'triangle',0.2); },
    reject(){ slide(300,80,0.25,'sawtooth',0.6); },
    smack(){ slide(200,55,0.12,'square',0.75); tone(70,0.07,'sawtooth',0.6); },
    shoot(){ tone(420,0.05,'square',0.3); },
    jump(){ tone(330,0.09,'triangle',0.4); },
    hurt(){ tone(90,0.25,'sawtooth',0.7); },
    roar(){ slide(240,45,0.8,'sawtooth',0.9); slide(190,38,0.8,'square',0.5); },
    cheer(){ [523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'square',0.25),i*40)); },
    streak(){ [659,880,1175].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'square',0.4),i*60)); },
    special(){ tone(440,0.05,'square',0.6); tone(660,0.15,'square',0.5); setTimeout(()=>tone(990,0.25,'sawtooth',0.6),120); },
    win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.3,'square',0.5),i*140)); },
    lose(){ [330,247,196,131].forEach((f,i)=>setTimeout(()=>tone(f,0.35,'sawtooth',0.5),i*160)); },
  };
})();
document.getElementById('mute').addEventListener('click',e=>{ const m=!Sound.isMuted(); Sound.setMuted(m);
  e.target.textContent='SOUND: '+(m?'OFF':'ON'); e.target.style.color=m?'#666':'var(--cyan)'; e.target.style.borderColor=m?'#666':'var(--cyan)'; });

/* ---------------- Input ---------------- */
const keys={left:false,right:false,jump:false,shoot:false,special:false};
const pressed={jump:false,shoot:false,special:false};
const KEYMAP={ArrowLeft:'left',KeyA:'left',ArrowRight:'right',KeyD:'right',
  Space:'jump',ArrowUp:'jump',KeyW:'jump',KeyJ:'shoot',KeyL:'shoot',KeyK:'special'};
addEventListener('keydown',e=>{ const k=KEYMAP[e.code]; if(!k) return; e.preventDefault();
  if(!keys[k]&&(k==='jump'||k==='shoot'||k==='special')) pressed[k]=true; keys[k]=true; userStart(); });
addEventListener('keyup',e=>{ const k=KEYMAP[e.code]; if(k){keys[k]=false; e.preventDefault();} });
document.querySelectorAll('.btn').forEach(b=>{ const k=b.dataset.k;
  const on=ev=>{ ev.preventDefault(); if(!keys[k]&&(k==='jump'||k==='shoot'||k==='special')) pressed[k]=true; keys[k]=true; userStart(); };
  const off=ev=>{ ev.preventDefault(); keys[k]=false; };
  b.addEventListener('touchstart',on,{passive:false}); b.addEventListener('touchend',off,{passive:false});
  b.addEventListener('mousedown',on); b.addEventListener('mouseup',off); b.addEventListener('mouseleave',off); });
canvas.addEventListener('pointerdown',e=>{ userStart();
  if(state==='title') startGame();
  else if(state==='over'){ const p=canvasPoint(e); handleEndClick(p.x,p.y); } });
function userStart(){ Sound.resume(); }
function canvasPoint(e){ const r=canvas.getBoundingClientRect();
  return {x:(e.clientX-r.left)*(VW/r.width), y:(e.clientY-r.top)*(VH/r.height)}; }

/* ---------------- State ---------------- */
let state='title', result='', last=0;
let timeLeft, titanHP, hp, meter, phase, made, attempts, combo, bestCombo, damageDealt;
let shake, redTint, enrageT, rageLevel, invincT, transformT, blockState, blockT, blockCdT, roarText, cheerT, streakFlash, streakN;
let cutIn=null, cutInT=0, hitCount=0, goldBallDropped=false, swishT=0;
const SPECIALS=['FADEAWAY','CELEBRATION 3','MAMBA RAGE']; let specialIdx;
const player={x:VW*0.28,y:GROUND,vy:0,w:30,h:62,onGround:true,face:1,shotT:0,specialT:0,specialKind:'',invuln:0,capePh:0};
const titan={x:VW*0.72,y:VH*0.20,armRaise:0};
let balls=[], attacks=[], particles=[], bricks=[], stars=[], rats=[];
let attackTimer;

function glowCol(){ return CONFIG.RAGE_GLOW[rageLevel]||CONFIG.RAGE_GLOW[0]; }
function streakTier(c){ return c>=50?5:c>=25?4:c>=10?3:c>=5?2:c>=3?1:0; }
function showCutIn(key,label,color,glow,dur){ if(IMG[key]){ cutIn={img:IMG[key],label,color,glow:!!glow}; cutInT=dur||CUTIN_DUR; } }

function resetGame(){
  timeLeft=CONFIG.QUARTER_SECONDS; titanHP=CONFIG.TITAN_HP; hp=CONFIG.PLAYER_HP;
  meter=0; phase=1; made=0; attempts=0; combo=0; bestCombo=0; damageDealt=0;
  shake=0; redTint=0; enrageT=0; rageLevel=0; invincT=0; transformT=0;
  blockState='idle'; blockT=0; blockCdT=1.5; roarText=0; cheerT=0; streakFlash=0; streakN=0; cutIn=null; cutInT=0; hitCount=0; goldBallDropped=false; swishT=0;
  specialIdx=0; attackTimer=1.4;
  player.x=VW*0.28; player.y=GROUND; player.vy=0; player.onGround=true; player.shotT=0; player.specialT=0; player.invuln=0;
  titan.armRaise=0; balls=[]; attacks=[]; particles=[]; bricks=[];
  stars=Array.from({length:60},()=>({x:Math.random()*VW,y:Math.random()*VH*0.55,s:Math.random()*1.5+0.4}));
  rats=Array.from({length:4},()=>({x:Math.random()*VW,vx:(Math.random()<0.5?-1:1)*(40+Math.random()*40),ph:Math.random()*6}));
}
function startGame(){ resetGame(); state='play'; Sound.restartMusic(); }   // song restarts from the top each play

/* ---------------- Helpers ---------------- */
function spawnParticles(x,y,color,n=10,spd=200){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2,s=Math.random()*spd;
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-80,life:0.6+Math.random()*0.4,color}); } }
function rectsOverlap(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }
function playerBox(){ return {x:player.x-player.w/2,y:player.y-player.h,w:player.w,h:player.h}; }

function damageTitan(d){
  if(invincT>0) return false;
  titanHP=Math.max(0,titanHP-d); damageDealt+=d;
  spawnParticles(HOOP.x,HOOP.y,'#fff',12,240); shake=Math.min(shake+4,12);
  if(rageLevel<2 && titanHP<=CONFIG.TITAN_HP*0.25) startTransition(2);
  else if(rageLevel<1 && titanHP<=CONFIG.TITAN_HP*0.5) startTransition(1);
  if(titanHP<=0) endGame('win');
  return true;
}
function startTransition(level){ rageLevel=level; enrageT=4.5; Sound.roar(); blockCdT=0.25;
  if(level>=2){ invincT=2.0; transformT=2.4; roarText=2.4; shake=24; spawnParticles(titan.x,titan.y,glowCol(),64,440);
    if(!goldBallDropped){ goldBallDropped=true; attacks.push({type:'goldball',x:VW*0.40+Math.random()*VW*0.12,y:-40,vy:105,w:40}); } }  // EPIC final form + one-time golden Kobe-meter ball
  else { invincT=CONFIG.INVINCIBLE_TIME; transformT=1.5; roarText=1.7; shake=12; spawnParticles(titan.x,titan.y,glowCol(),34,340); } }
function hurtPlayer(){ if(player.invuln>0) return;
  const dmg=CONFIG.SMACK_DMG+(rageLevel>=2?2:rageLevel>=1?1:0);
  hp-=dmg; player.invuln=1.4; combo=0; Sound.hurt(); shake=10; redTint=0.6;
  spawnParticles(player.x,player.y-30,CONFIG.KNICKS_ORANGE,12);
  showCutIn('lebron','AURA LOST','#FDB927');                 // LeBron cut-in whenever you lose a life
  if(hp<=0){ hp=0; endGame('lose'); } }
function endGame(r){ result=r; state='over'; shake=0; redTint=0; Sound.stopMusic(); if(r==='win') Sound.win(); else Sound.lose(); }

function shareText(){ const t= result==='win'
  ? `I saved New York! Took down the alien Wemby Titan with ${Math.ceil(timeLeft)}s left, ${made} buckets, best streak x${bestCombo}! 🗽🏀`
  : `The Wemby Titan bricked me into next week... ${made} buckets, ${Math.round(damageDealt)} dmg. Can YOU save NYC? 🗽🏀`;
  return `${t} ATTACK ON WEMBY ${CONFIG.SHARE_HASHTAG}`; }
function shareURL(){ return 'https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText())+'&url='+encodeURIComponent(CONFIG.SITE_URL); }

/* ---------------- Shooting ---------------- */
function shoot(){ if(player.shotT>0) return;
  player.shotT=CONFIG.SHOT_COOLDOWN; Sound.shoot();
  const x0=player.x, y0=player.y-50, dist=Math.hypot(HOOP.x-x0,HOOP.y-y0), three=player.x<VW*0.40;
  balls.push({x:x0,y:y0,x0,y0,t:0,dur:0.55+dist/1400,arc:110+dist*0.18,three,resolved:false,special:false}); }

/* ---------------- Blocking via falling bricks ---------------- */
function spawnBricks(){ const z=blockZone(), n=4+rageLevel*2;     // more bricks the angrier he gets
  for(let i=0;i<n;i++) bricks.push({x:z.x+8+Math.random()*(z.w-16),y:z.y-20-Math.random()*40,vy:260+Math.random()*120,rot:Math.random()*6,vr:(Math.random()-0.5)*8}); }
function updateBlock(dt){
  // 50% = harder, 25% = super hard: blocks far more often, longer, faster windups
  const baseCd=[1.5,0.85,0.42][rageLevel], activeDur=[0.5,0.66,0.84][rageLevel], warnDur=[0.26,0.21,0.15][rageLevel];
  if(blockState==='idle'){ blockCdT-=dt; if(blockCdT<=0){ blockState='warn'; blockT=warnDur; } }
  else if(blockState==='warn'){ blockT-=dt; titan.armRaise=Math.min(1,titan.armRaise+dt*4);
    if(blockT<=0){ blockState='active'; blockT=activeDur; spawnBricks(); } }
  else if(blockState==='active'){ blockT-=dt; if(blockT<=0){ blockState='idle'; blockCdT=baseCd+Math.random()*(0.6-rageLevel*0.15); } }
  if(blockState!=='warn'&&blockState!=='active') titan.armRaise=Math.max(0,titan.armRaise-dt*3);
}
function blockZone(){ return rageLevel>=2 ? {x:HOOP.x-92,y:HOOP.y-56,w:150,h:124}   // FINAL FORM: 4 arms guard a much wider rim
                                          : {x:HOOP.x-62,y:HOOP.y-46,w:92,h:96}; }

/* ---------------- Attacks ---------------- */
function spawnAttack(){
  // Difficulty scales with rageLevel: 0 = above 50% HP (chill), 1 = past 50%, 2 = past 25% (crazy)
  const r=rageLevel, ratChance=[0.18,0.42,0.40][r], brickVy=[240,380,560][r], brickWarn=[0.5,0.4,0.28][r];
  if(Math.random()<ratChance){   // GIANT RAT charge (fewer + more spaced out at rage 2)
    attacks.push({type:'stomp',x:titan.x,dir:player.x<titan.x?-1:1,speed:380+r*100,warn:[0.55,0.42,0.4][r],life:3,w:46}); Sound.squeak();
    if(r>=1 && Math.random()<(r>=2?0.22:0.4)){ const fl=Math.random()<0.5; attacks.push({type:'stomp',x:fl?-40:VW+40,dir:fl?1:-1,speed:360+r*100,warn:0.25,life:4,w:44}); }
  } else {                        // falling BRICK(s), faster + more each tier
    const tx=120+Math.random()*(VW-300); attacks.push({type:'debris',x:tx,y:-40,vy:brickVy,warn:brickWarn,w:50,rot:Math.random()*6});
    if(r>=1 && Math.random()<(r>=2?0.75:0.35)){ const tx2=120+Math.random()*(VW-300); attacks.push({type:'debris',x:tx2,y:-110,vy:brickVy-20,warn:brickWarn+0.1,w:46,rot:Math.random()*6}); }
    if(r>=2 && Math.random()<0.55){ const tx3=120+Math.random()*(VW-300); attacks.push({type:'debris',x:tx3,y:-185,vy:brickVy,warn:brickWarn+0.15,w:44,rot:Math.random()*6}); }
  }
  // +1 pizza drops on the LEFT (collectible even at full HP)
  if(Math.random()<0.2){ const px=70+Math.random()*(VW*0.34); attacks.push({type:'pizza',x:px,y:-30,vy:150,w:30}); }
  // +2 golden mega-pizza drops on the RIGHT by Wemby (collectible even at full HP)
  if(Math.random()<0.13){ attacks.push({type:'goldpizza',x:VW*0.56+Math.random()*VW*0.08,y:-30,vy:118,w:48}); }
}

/* ---------------- Update ---------------- */
function update(dt){
  const np=timeLeft<=20?3:timeLeft<=40?2:1; if(np!==phase) phase=np;
  timeLeft-=dt; if(timeLeft<=0){ timeLeft=0; endGame('lose'); return; }
  if(enrageT>0) enrageT-=dt; if(roarText>0) roarText-=dt; if(cheerT>0) cheerT-=dt;
  if(invincT>0) invincT-=dt; if(transformT>0) transformT-=dt; if(streakFlash>0) streakFlash-=dt; if(cutInT>0) cutInT-=dt; if(swishT>0) swishT-=dt;

  let mv=0; if(keys.left) mv-=1; if(keys.right) mv+=1; if(mv) player.face=mv;
  player.x+=mv*CONFIG.PLAYER_SPEED*dt; player.x=Math.max(30,Math.min(VW*0.62,player.x));
  if(pressed.jump&&player.onGround){ player.vy=-CONFIG.JUMP_V; player.onGround=false; Sound.jump(); }
  player.vy+=CONFIG.GRAVITY*dt; player.y+=player.vy*dt;
  if(player.y>=GROUND){ player.y=GROUND; player.vy=0; player.onGround=true; }
  if(player.invuln>0) player.invuln-=dt; if(player.shotT>0) player.shotT-=dt; if(player.specialT>0) player.specialT-=dt;
  player.capePh+=dt*6;

  if(pressed.shoot) shoot();

  if(pressed.special && meter>=CONFIG.METER_MAX && player.specialT<=0){
    meter=0; player.specialT=0.7; player.specialKind='KOBE FADEAWAY'; Sound.special(); shake=8;
    showCutIn('kobe','KOBE!','#f9c80e',true);               // gold-glowing Kobe cut-in on the "K" shot
    // ONE unblockable golden ball, worth 2x a normal basket
    const x0=player.x,y0=player.y-50,dist=Math.hypot(HOOP.x-x0,HOOP.y-y0);
    balls.push({x:x0,y:y0,x0,y0,t:0,dur:0.5+dist/1500,arc:120,three:false,resolved:false,special:true,gold:true});
  }
  pressed.jump=pressed.shoot=pressed.special=false;

  updateBlock(dt);
  bricks.forEach(b=>{ b.y+=b.vy*dt; b.rot+=b.vr*dt; }); bricks=bricks.filter(b=>b.y<VH+40);

  const bz=blockZone(), blocking=(blockState==='active');
  balls.forEach(b=>{
    if(b.t<0){ b.t+=dt; return; }
    b.t+=dt/b.dur; const tt=Math.min(1,b.t);
    b.x=b.x0+(HOOP.x-b.x0)*tt; b.y=b.y0+(HOOP.y-b.y0)*tt - b.arc*Math.sin(Math.PI*tt);
    if(!b.resolved && !b.special && blocking && b.x>bz.x && b.x<bz.x+bz.w && b.y>bz.y && b.y<bz.y+bz.h){
      b.resolved=true; b.blocked=true; b.vx=-260; b.vy=-200; Sound.smack(); shake=6;
      combo=0; attempts++; spawnParticles(b.x,b.y,'#b5532b',14,260); roarText=Math.max(roarText,0.6);
      showCutIn('wemby','IN YOUR HEAD','#6f3bff'); }       // Wemby cut-in when your shot is bricked
    if(!b.resolved && b.t>=1){ b.resolved=true; b.dead=true; attempts++;
      if(invincT>0){ b.shield=true; Sound.reject(); spawnParticles(HOOP.x,HOOP.y,'#9be7ff',12,220); }
      else { made++; let dmg=CONFIG.SWISH_DAMAGE*(b.three?CONFIG.THREE_BONUS:1)*(b.special?2:1);
        const tier=streakTier(combo); if(tier>=1) dmg*=(1+tier*CONFIG.STREAK_DMG_STEP);
        damageTitan(dmg); registerMake(b.three); spawnParticles(HOOP.x,HOOP.y,b.three?CONFIG.KNICKS_ORANGE:'#fff',18,280); } }

  ctx.beginPath(); ctx.moveTo(x-9,y-72); ctx.lineTo(x-6,y-86); ctx.lineTo(x-2,y-72); ctx.closePath();
  ctx.moveTo(x+9,y-72); ctx.lineTo(x+6,y-86); ctx.lineTo(x+2,y-72); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#9be7ff'; ctx.fillRect(x-6,y-68,4,3); ctx.fillRect(x+2,y-68,4,3);
  // shooting arm (orange)
  ctx.strokeStyle=CONFIG.KNICKS_ORANGE; ctx.lineWidth=7;
  if(player.shotT>CONFIG.SHOT_COOLDOWN-0.18){ ctx.beginPath(); ctx.moveTo(x,y-50); ctx.lineTo(x+player.face*14,y-72); ctx.stroke(); }
  else { ctx.beginPath(); ctx.moveTo(x,y-50); ctx.lineTo(x+player.face*16,y-50); ctx.stroke(); }
  if(player.specialT>0){ ctx.fillStyle=`rgba(249,200,14,${player.specialT})`; ctx.beginPath(); ctx.arc(x,y-40,46,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 12px Courier New'; ctx.fillText(player.specialKind,x,y-92); }
  ctx.restore();
}

function drawBalls(){ balls.forEach(b=>{ if(b.t<0) return;
  if(b.gold){ ctx.save(); ctx.globalAlpha=0.55+0.2*Math.sin(performance.now()/80); ctx.fillStyle='#f9c80e'; ctx.beginPath(); ctx.arc(b.x,b.y,17,0,Math.PI*2); ctx.fill(); ctx.restore(); }
  const grd=ctx.createRadialGradient(b.x-4,b.y-4,2,b.x,b.y,9); grd.addColorStop(0,'#ffb05a'); grd.addColorStop(1,'#d35400');
  ctx.fillStyle=b.special?'#f9c80e':grd; ctx.beginPath(); ctx.arc(b.x,b.y,9,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#5a2d00'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(b.x-9,b.y); ctx.lineTo(b.x+9,b.y); ctx.moveTo(b.x,b.y-9); ctx.lineTo(b.x,b.y+9); ctx.stroke(); }); }

function drawAttacks(){ attacks.forEach(a=>{
    if(a.type==='smack'){ if(a.warn>0){ ctx.fillStyle=`rgba(255,42,109,${0.3+0.4*Math.sin(performance.now()/60)})`; ctx.fillRect(a.x-a.w/2,GROUND-6,a.w,6);
        ctx.fillStyle='rgba(255,42,109,0.9)'; ctx.font='bold 15px Courier New'; ctx.textAlign='center'; ctx.fillText('⚠ SMACK',a.x,GROUND-42); }
      else if(a.active>0){ ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fillRect(a.x-a.w/2,GROUND-40,a.w,40); } }
    else if(a.type==='debris'){ if(a.warn>0){ ctx.fillStyle=`rgba(181,83,43,${0.4+0.4*Math.sin(performance.now()/60)})`; ctx.fillRect(a.x-a.w/2,GROUND-4,a.w,4); }
      else { ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.rot+a.y/70);   // big falling BRICK
        const bw=a.w, bh=a.w*0.62; ctx.fillStyle='#b5532b'; ctx.fillRect(-bw/2,-bh/2,bw,bh);
        ctx.strokeStyle='#7d3a1d'; ctx.lineWidth=2; ctx.strokeRect(-bw/2,-bh/2,bw,bh);
        ctx.beginPath(); ctx.moveTo(-bw/2,0); ctx.lineTo(bw/2,0); ctx.moveTo(0,-bh/2); ctx.lineTo(0,0); ctx.stroke(); ctx.restore(); } }
    else if(a.type==='stomp'){ if(a.warn>0){ ctx.fillStyle='rgba(255,90,90,0.9)'; ctx.font='bold 14px Courier New'; ctx.textAlign='center'; ctx.fillText('GIANT RAT! JUMP!',titan.x,GROUND-44); }
      else { ctx.save(); ctx.translate(a.x,GROUND-15); const d=a.dir, leg=Math.sin(performance.now()/40)*3;
        ctx.fillStyle='#4a4a4a'; ctx.beginPath(); ctx.ellipse(0,0,28,16,0,0,Math.PI*2); ctx.fill();           // body
        ctx.strokeStyle='#3a3a3a'; ctx.lineWidth=4; ctx.lineCap='round';                                       // legs
        ctx.beginPath(); ctx.moveTo(-8,12); ctx.lineTo(-8,18+leg); ctx.moveTo(10,12); ctx.lineTo(10,18-leg); ctx.stroke();
        ctx.fillStyle='#555'; ctx.beginPath(); ctx.ellipse(d*24,-5,13,11,0,0,Math.PI*2); ctx.fill();            // head
        ctx.beginPath(); ctx.arc(d*16,-16,6,0,7); ctx.fill();                                                   // ear
        ctx.strokeStyle='#4a4a4a'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-d*26,2); ctx.quadraticCurveTo(-d*50,-8,-d*56,8); ctx.stroke(); // tail
        ctx.fillStyle='#2b2b2b'; ctx.beginPath(); ctx.arc(d*34,-7,3,0,7); ctx.fill();                           // nose
        ctx.fillStyle='#ff4a4a'; ctx.beginPath(); ctx.arc(d*26,-8,2.5,0,7); ctx.fill(); ctx.restore(); } }       // red eye
    else if(a.type==='pizza'){ ctx.save(); ctx.translate(a.x,a.y); ctx.fillStyle='#f9c80e'; ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(12,10); ctx.lineTo(-12,10); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.arc(-3,2,2,0,7); ctx.arc(4,4,2,0,7); ctx.fill(); ctx.restore();
      ctx.fillStyle='#f9c80e'; ctx.font='9px Courier New'; ctx.textAlign='center'; ctx.fillText('+1 HP',a.x,a.y-18); }
    else if(a.type==='goldpizza'){ ctx.save(); ctx.translate(a.x,a.y);
      ctx.globalAlpha=0.5+0.3*Math.sin(performance.now()/100); ctx.fillStyle='#f9c80e'; ctx.beginPath(); ctx.arc(0,0,a.w*0.72,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;   // glow
      ctx.fillStyle='#ffd23b'; ctx.beginPath(); ctx.moveTo(0,-a.w*0.5); ctx.lineTo(a.w*0.42,a.w*0.42); ctx.lineTo(-a.w*0.42,a.w*0.42); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#b8860b'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.arc(-5,2,3,0,7); ctx.arc(6,7,3,0,7); ctx.arc(2,-6,2.5,0,7); ctx.fill(); ctx.restore();
      ctx.fillStyle='#f9c80e'; ctx.font='bold 13px Courier New'; ctx.textAlign='center'; ctx.fillText('+2 HP!',a.x,a.y-a.w*0.72-6); }
    else if(a.type==='goldball'){ ctx.save(); ctx.translate(a.x,a.y);
      ctx.globalAlpha=0.45+0.3*Math.sin(performance.now()/90); ctx.fillStyle='#f9c80e'; ctx.beginPath(); ctx.arc(0,0,a.w*0.9,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;   // halo
      const g=ctx.createRadialGradient(-5,-5,3,0,0,a.w*0.55); g.addColorStop(0,'#fff3b0'); g.addColorStop(1,'#e6a700'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,a.w*0.55,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#8a6500'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-a.w*0.55,0); ctx.lineTo(a.w*0.55,0); ctx.moveTo(0,-a.w*0.55); ctx.lineTo(0,a.w*0.55); ctx.stroke();
      ctx.restore();
      ctx.fillStyle='#f9c80e'; ctx.font='bold 12px Courier New'; ctx.textAlign='center'; ctx.fillText('CLUTCH MODE',a.x,a.y-a.w*0.9-6); } }); }
function drawParticles(){ particles.forEach(p=>{ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,3,3); }); ctx.globalAlpha=1; }

function drawHUD(){
  ctx.fillStyle='#fff'; ctx.font='bold 28px Courier New'; ctx.textAlign='center';
  const m=Math.floor(timeLeft/60),s=Math.floor(timeLeft%60); ctx.fillText(`4TH  ${m}:${s<10?'0':''}${s}`,VW/2,36);
  ctx.font='11px Courier New'; ctx.fillStyle='#05d9e8'; ctx.fillText(`PHASE ${phase}${rageLevel>0?'  •RAGE '+rageLevel+'•':''}`,VW/2,52);
  ctx.textAlign='left'; ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(VW/2-220,62,440,15);
  ctx.fillStyle=glowCol(); ctx.fillRect(VW/2-220,62,440*(titanHP/CONFIG.TITAN_HP),15);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(VW/2-220,62,440,15);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.fillRect(VW/2,62,1,15); ctx.fillRect(VW/2-110,62,1,15);
  ctx.fillStyle='#fff'; ctx.font='11px Courier New'; ctx.fillText(CONFIG.BOSS_NAME+' #'+CONFIG.BOSS_NUM,VW/2-220,58);
  for(let i=0;i<CONFIG.PLAYER_HP;i++){ ctx.fillStyle=i<hp?'#ff2a6d':'rgba(255,255,255,0.2)'; ctx.font='20px Courier New'; ctx.fillText('♥',18+i*22,36); }
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(18,46,170,11);
  ctx.fillStyle=meter>=CONFIG.METER_MAX?'#f9c80e':'#05d9e8'; ctx.fillRect(18,46,170*(meter/CONFIG.METER_MAX),11);
  ctx.fillStyle='#fff'; ctx.font='10px Courier New'; ctx.fillText(meter>=CONFIG.METER_MAX?'SPECIAL: KOBE FADEAWAY (K/SP)':'MAMBA METER',18,68);
  const tier=streakTier(combo);
  if(combo>=3){ ctx.textAlign='right'; ctx.fillStyle='#f9c80e'; ctx.font=`bold ${14+tier*2}px Courier New`; ctx.fillText(`🔥 STREAK x${combo}`,VW-16,36); }
  else if(combo>=1){ ctx.textAlign='right'; ctx.fillStyle='#fff'; ctx.font='13px Courier New'; ctx.fillText(`STREAK x${combo}`,VW-16,36); }
  if(streakFlash>0){ ctx.textAlign='center'; const a=Math.min(1,streakFlash);
    ctx.fillStyle=`rgba(249,200,14,${a})`; ctx.font=`bold ${34+streakN*0.2}px Courier New`; ctx.fillText(`STREAK x${streakN}!`,VW/2,VH*0.30); }
  if(roarText>0 && streakFlash<=0){ ctx.textAlign='center'; ctx.fillStyle=`rgba(255,42,109,${Math.min(1,roarText)})`;
    const big=invincT>0&&rageLevel>=2; ctx.font='bold '+(big?42:30)+'px Courier New';
    ctx.fillText(invincT>0?(rageLevel>=2?'FINAL FORM!':'WEMBY ROARS!'):'BRICKED!',VW/2,VH*0.4); }
}

/* portrait cut-in, top-middle */
function drawCutIn(){ if(cutInT<=0||!cutIn) return;
  const w=132,h=132, cx=VW/2-w/2, cy=84, ccx=VW/2, ccy=cy+h/2;
  const a=Math.min(1,cutInT*2.2), pop=cutInT>CUTIN_DUR-0.12?1.08:1;
  ctx.save(); ctx.globalAlpha=a;
  ctx.translate(ccx,ccy); ctx.scale(pop,pop); ctx.translate(-ccx,-ccy);
  if(cutIn.glow){   // animated gold halo + rotating rays for the Kobe card
    const pr=92+12*Math.sin(performance.now()/90);
    const gg=ctx.createRadialGradient(ccx,ccy,18,ccx,ccy,pr);
    gg.addColorStop(0,'rgba(249,200,14,0.85)'); gg.addColorStop(0.55,'rgba(249,200,14,0.35)'); gg.addColorStop(1,'rgba(249,200,14,0)');
    ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(ccx,ccy,pr,0,Math.PI*2); ctx.fill(); ctx.restore();
    ctx.save(); ctx.globalAlpha=a*0.55; ctx.strokeStyle='#ffe27a'; ctx.lineWidth=2; ctx.translate(ccx,ccy); ctx.rotate(performance.now()/600);
    for(let i=0;i<12;i++){ ctx.rotate(Math.PI/6); ctx.beginPath(); ctx.moveTo(0,h/2+10); ctx.lineTo(0,h/2+24); ctx.stroke(); } ctx.restore(); }
  ctx.fillStyle=cutIn.color; ctx.fillRect(cx-5,cy-5,w+10,h+10);
  ctx.fillStyle='#000'; ctx.fillRect(cx,cy,w,h);
  if(imgReady(cutIn.img)) drawCover(cutIn.img,cx,cy,w,h);
  ctx.fillStyle=cutIn.color; ctx.fillRect(cx-5,cy+h+5,w+10,22);
  ctx.fillStyle='#fff'; ctx.font='bold 13px Courier New'; ctx.textAlign='center'; ctx.fillText(cutIn.label,VW/2,cy+h+21);
  ctx.restore(); }

let endBtns={};
function drawTitle(){
  if(imgReady(IMG.aot)) drawCover(IMG.aot,0,0,VW,VH); else { drawBackground(); drawHoop(); drawTitan(); }
  ctx.fillStyle='rgba(5,1,15,0.5)'; ctx.fillRect(0,0,VW,VH); ctx.textAlign='center';
  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.95)'; ctx.shadowBlur=8;
  ctx.fillStyle='#ff2a6d'; ctx.font='bold 60px Courier New'; ctx.fillText('ATTACK ON WEMBY',VW/2,VH/2-66);
  ctx.fillStyle='#05d9e8'; ctx.font='bold 24px Courier New'; ctx.fillText('Save NYC from the Alien Titan in 60 sec!',VW/2,VH/2-22);
  ctx.fillStyle='#fff'; ctx.font='bold 22px Courier New';
  ctx.fillText(isTouch?'MOVE  ·  JUMP to dodge  ·  SHOOT':'MOVE: A / D       DODGE: SPACE',VW/2,VH/2+18);
  ctx.fillText(isTouch?'tap SP for the KOBE special':'SHOOT: J       KOBE SPECIAL: K',VW/2,VH/2+48);
  ctx.fillStyle=`rgba(249,200,14,${0.5+0.5*Math.sin(performance.now()/300)})`; ctx.font='bold 30px Courier New';
  ctx.fillText(isTouch?'TAP TO START':'PRESS ANY KEY TO START',VW/2,VH/2+96); ctx.restore(); }
function drawOver(){ drawBackground(); drawHoop(); drawTitan(); ctx.fillStyle='rgba(5,1,15,0.8)'; ctx.fillRect(0,0,VW,VH); ctx.textAlign='center';
  if(result==='win'){ ctx.fillStyle='#f9c80e'; ctx.font='bold 50px Courier New'; ctx.fillText('NEW YORK IS SAVED',VW/2,VH/2-96); }
  else { ctx.fillStyle='#ff2a6d'; ctx.font='bold 50px Courier New'; ctx.fillText('THE CITY HAS FALLEN',VW/2,VH/2-96); }
  ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(VW/2-230,VH/2-74,460,190); ctx.strokeStyle='#05d9e8'; ctx.lineWidth=2; ctx.strokeRect(VW/2-230,VH/2-74,460,190);
  const rating= result==='win'?(timeLeft>30?'MAMBA':timeLeft>15?'ALL-STAR':'CLUTCH'):(damageDealt>2000?'VALIANT':damageDealt>900?'SCRAPPY':'ROOKIE');
  ctx.fillStyle='#fff'; ctx.font='bold 22px Courier New';
  ctx.fillText(result==='win'?'VICTORY':'DEFEAT',VW/2,VH/2-42);
  ctx.font='bold 19px Courier New';
  ctx.fillText(`BUCKETS  ${made}/${attempts}      STREAK  x${bestCombo}`,VW/2,VH/2-10);
  ctx.fillText(`DAMAGE  ${Math.round(damageDealt)}      TIME LEFT  ${Math.ceil(timeLeft)}s`,VW/2,VH/2+20);
  ctx.fillStyle='#f9c80e'; ctx.font='bold 24px Courier New'; ctx.fillText(`RATING:  ${rating}`,VW/2,VH/2+54);
  endBtns.share={x:VW/2-200,y:VH/2+126,w:190,h:48}; endBtns.again={x:VW/2+10,y:VH/2+126,w:190,h:48};
  ctx.fillStyle='#1da1f2'; ctx.fillRect(endBtns.share.x,endBtns.share.y,190,48); ctx.fillStyle='#fff'; ctx.font='bold 18px Courier New'; ctx.fillText('SHARE ON X',endBtns.share.x+95,endBtns.share.y+30);
  ctx.fillStyle='#ff2a6d'; ctx.fillRect(endBtns.again.x,endBtns.again.y,190,48); ctx.fillStyle='#fff'; ctx.fillText('PLAY AGAIN',endBtns.again.x+95,endBtns.again.y+30); }
function handleEndClick(x,y){ const inside=b=>x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h;
  if(endBtns.share&&inside(endBtns.share)) window.open(shareURL(),'_blank');
  else if(endBtns.again&&inside(endBtns.again)) startGame(); }

/* ---------------- Loop ---------------- */
function frame(t){ const dt=Math.min(0.033,(t-last)/1000)||0; last=t;
  if(state==='play') update(dt);
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,VW,VH);
  if(state==='play' && shake>0) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  if(state==='title') drawTitle();
  else if(state==='play'){ drawBackground(); drawHoop(); drawTitan(); drawBricks(); drawAttacks(); drawBalls(); drawPlayer(); drawParticles(); drawHUD(); drawCutIn(); }
  else if(state==='over') drawOver();
  if(state==='play' && redTint>0){ ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle=`rgba(255,0,40,${redTint*0.4})`; ctx.fillRect(0,0,VW,VH); }
  if(state==='play' && rageLevel>=2){ ctx.setTransform(1,0,0,1,0,0);   // crimson FINAL FORM vignette
    const v=ctx.createRadialGradient(VW/2,VH/2,VH*0.32,VW/2,VH/2,VH*0.8);
    v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,`rgba(226,59,46,${0.20+0.06*Math.sin(performance.now()/300)})`);
    ctx.fillStyle=v; ctx.fillRect(0,0,VW,VH); }
  requestAnimationFrame(frame); }
resetGame();   // initialize all values so the title screen renders (avoids NaN colors)
requestAnimationFrame(frame);
document.addEventListener('visibilitychange',()=>{ if(document.hidden) Sound.stopMusic(); else if(state==='play') Sound.startMusic(); });
</script>
